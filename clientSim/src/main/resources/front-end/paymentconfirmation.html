<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Paying Your Fine – Thank You</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/payment-confirmation.css" />
</head>
<body>

<header>
    <div class="logo-box">TV</div>
    <h1>Paying Your Fine</h1>
</header>

<main>
    <h2>Thank you</h2>

    <!-- Success banner -->
    <div class="success-banner">
        <span class="tick" aria-hidden="true">&#10003;</span>
        <p>Your payment has been successful</p>
    </div>

    <!-- Reference number -->
    <div class="reference-block">
        <p class="reference-label">Your payment reference number is</p>
        <p class="reference-number">QB9 67TS PMO</p>
    </div>

    <hr />

    <!-- What happens next -->
    <p class="section-title">What happens next</p>
    <p class="body-text">We have sent you a confirmation email</p>

    <hr />

    <!-- Payment Summary -->
    <div class="summary">
        <h3>Payment Summary</h3>
        <p class="summary-row"><span>Payment for:</span> <span>TV Licence fine</span></p>
        <p class="summary-row"><span>Total amount:</span></p>
        <div class="amount">£1,174.50</div>
    </div>

    <!-- PDF receipt -->
    <a href="#" class="btn-pdf">
        <span class="pdf-icon" aria-hidden="true">&#128196;</span>
        Get PDF receipt
    </a>

</main>

</body>
</html>
