spring.application.name=clientSim

# =====================================================
# AZURE SQL DATABASE CONFIGURATION
# =====================================================
# Connected to existing Azure SQL Database
spring.datasource.url=jdbc:sqlserver://groupa-clientsim.database.windows.net:1433;database=client-simgroup-a;encrypt=true;trustServerCertificate=false;loginTimeout=30;
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=GroupASimAdmin
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


# JPA/Hibernate Configuration for SQL Server
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2019Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# Server Configuration
server.servlet.context-path=/
server.port=8080

# SQL Initialization Configuration
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Thymeleaf Configuration
spring.thymeleaf.enabled=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true
