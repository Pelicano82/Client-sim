<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard – Paying Your Fine</title>
    <link rel="stylesheet" href="css/finepay.css" />
</head>
<body>

<!-- Header / Navigation Bar -->
<header class="navbar">
    <div class="navbar__brand">
        <div class="navbar__logo">
            <span class="navbar__logo-text">TV</span>
        </div>
        <span class="navbar__title">Paying Your Fine</span>
    </div>
</header>

<!-- Main Content -->
<main class="main">
    <div class="content-container">

        <!-- Welcome Heading -->
        <!-- DB field: user.firstName -->
        <h1 class="welcome-heading">Welcome <span th:text="${user.firstName}"></span></h1>

        <!-- Licence Info Cards Row -->
        <div class="cards-row">

            <!-- Card: TV Licence Registered to -->
            <div class="card">
                <div class="card__header">TV Licence Registered to:</div>
                <div class="card__body">
                    <p th:text="${user.fullName}"></p>        <!-- DB field: user.fullName -->
                    <p th:text="${user.addressLine1}"></p>    <!-- DB field: user.addressLine1 -->
                    <p th:text="${user.city}"></p>            <!-- DB field: user.city -->
                    <p th:text="${user.postcode}"></p>        <!-- DB field: user.postcode -->
                </div>
            </div>

            <!-- Card: TV Licence Details -->
            <div class="card">
                <div class="card__header">TV Licence Details:</div>
                <div class="card__body">
                    <div class="detail-row">
                        <span class="detail-label">TV Licence Number</span>
                        <span class="detail-value" th:text="${licence.licenceNumber}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">TV Licence Fee</span>
                        <span class="detail-value" th:text="${licence.fee}"></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Valid Until</span>
                        <span class="detail-value" th:text="${licence.validUntil}"></span>
                    </div>
                </div>
            </div>

        </div><!-- /.cards-row -->

        <!-- Options Section -->
        <h2 class="options-heading">Please Choose an Option Below</h2>

        <div class="radio-group">
            <label class="radio-label">
                <input class="radio-input" type="radio" name="licence-option" value="renew" checked onchange="updateTotal()" />
                <span class="radio-custom"></span>
                Renew Licence
                <span class="renewal-cost-box">Renewal Cost: <strong>£159.00</strong></span>
            </label>
            <label class="radio-label">
                <input class="radio-input" type="radio" name="licence-option" value="cancel" onchange="updateTotal()" />
                <span class="radio-custom"></span>
                Cancel Licence
            </label>
        </div>

        <!-- Fine Amount + Total Row -->
        <form id="fineForm" method="post" action="/finepay-submit">
            <div class="fine-row">
                <div class="fine-input-group">
                    <label class="fine-label" for="fine-amount">
                        Please Enter the Fine Amount:
                    </label>
                    <input
                            class="fine-input"
                            type="text"
                            id="fine-amount"
                            name="fine-amount"
                            placeholder="£0.00"
                            required
                            onchange="updateTotal()"
                            oninput="updateTotal()"
                    />
                </div>

                <div class="total-group">
                    <span class="total-label">Total To Be Paid:</span>
                    <span class="total-value" id="totalAmount">£0.00</span>
                </div>
            </div>

            <!-- Proceed to Payment Button -->
            <div class="form-actions">
                <button type="submit" class="btn-proceed">Proceed to Payment</button>
            </div>
            
            <input type="hidden" name="licence-option" id="licenceOptionHidden" value="renew" />
        </form>

    </div>
</main>

<script>
    const RENEWAL_COST = 159.00;

    function updateTotal() {
        const selectedOption = document.querySelector('input[name="licence-option"]:checked').value;
        const userEnteredAmount = parseFloat(document.getElementById('fine-amount').value) || 0;
        
        // Update hidden field for form submission
        document.getElementById('licenceOptionHidden').value = selectedOption;
        
        let total = userEnteredAmount;
        
        if (selectedOption === 'renew') {
            total += RENEWAL_COST;
        }
        
        document.getElementById('totalAmount').textContent = '£' + total.toFixed(2);
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        updateTotal();
    });
    
    // Update hidden field when radio changes
    document.querySelectorAll('input[name="licence-option"]').forEach(radio => {
        radio.addEventListener('change', function() {
            updateTotal();
        });
    });
</script>
</body>
</html>
