spring.application.name=clientSim

# =====================================================
# AZURE SQL DATABASE CONFIGURATION
# =====================================================
# Replace these with your actual Azure SQL Server details
spring.datasource.url=jdbc:sqlserver://YOUR_SERVER_NAME.database.windows.net:1433;database=clientsimdb;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sqladmin
spring.datasource.password=YOUR_PASSWORD_HERE

# JPA/Hibernate Configuration for SQL Server
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2016Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Server Configuration
server.servlet.context-path=/
server.port=8080

# SQL Initialization Configuration
spring.sql.init.mode=never

# Thymeleaf Configuration
spring.thymeleaf.enabled=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true
